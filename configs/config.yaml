# Configuração do ERP Opity
# Sistema ERP Modular Multiempresa

# Configurações do Servidor
server:
  port: 8080
  host: "0.0.0.0"
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

# Configurações do Banco de Dados
database:
  driver: "postgres"
  host: "localhost"
  port: 5432
  name: "erp_opity"
  user: "erp_user"
  password: "erp_password_2024"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"

# Configurações de Segurança
security:
  jwt_secret: "sua_chave_secreta_muito_segura_aqui"
  jwt_expiration: "24h"
  bcrypt_cost: 12
  session_timeout: "8h"
  max_login_attempts: 5
  lockout_duration: "30m"

# Configurações de Log
logging:
  level: "info"  # debug, info, warn, error, fatal
  format: "json" # json, text
  output: "stdout" # stdout, file
  file_path: "logs/erp-opity.log"
  max_size: 100  # MB
  max_age: 30    # dias
  max_backups: 10

# Módulos Ativos
modules:
  - name: "core"
    enabled: true
    version: "1.0.0"
  - name: "retail"
    enabled: true
    version: "1.0.0"
  - name: "stock"
    enabled: true
    version: "1.0.0"
  - name: "sale"
    enabled: true
    version: "1.0.0"
  - name: "purchase"
    enabled: true
    version: "1.0.0"
  - name: "account"
    enabled: true
    version: "1.0.0"
  - name: "hr"
    enabled: true
    version: "1.0.0"

# Configurações de Cache
cache:
  driver: "memory" # memory, redis
  redis:
    host: "localhost"
    port: 6379
    password: ""
    db: 0
  ttl: "1h"

# Configurações de Email
email:
  driver: "smtp" # smtp, sendgrid, mailgun
  smtp:
    host: "smtp.gmail.com"
    port: 587
    username: "seu_email@gmail.com"
    password: "sua_senha_de_app"
    from: "noreply@erp-opity.com"
  sendgrid:
    api_key: "sua_api_key_sendgrid"
    from: "noreply@erp-opity.com"

# Configurações de Upload
upload:
  driver: "local" # local, s3, gcs
  max_size: 10 # MB
  allowed_types:
    - "image/jpeg"
    - "image/png"
    - "image/gif"
    - "application/pdf"
    - "application/msword"
    - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
  local:
    path: "uploads/"
  s3:
    bucket: "erp-opity-uploads"
    region: "us-east-1"
    access_key: "sua_access_key"
    secret_key: "sua_secret_key"

# Configurações de Notificação
notifications:
  websocket:
    enabled: true
    port: 8081
  push:
    enabled: false
    fcm_key: "sua_fcm_key"

# Configurações de Backup
backup:
  enabled: true
  schedule: "0 2 * * *" # Cron expression: 2 AM daily
  retention: 30 # dias
  path: "backups/"
  compression: true

# Configurações de Monitoramento
monitoring:
  metrics:
    enabled: true
    port: 9090
  health_check:
    enabled: true
    interval: "30s"

# Configurações de Desenvolvimento
development:
  debug: false
  hot_reload: false
  cors:
    enabled: true
    origins:
      - "http://localhost:3000"
      - "http://localhost:8080"
    methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    headers:
      - "Content-Type"
      - "Authorization"
      - "X-Requested-With"

# Configurações Específicas do Varejo
retail:
  pos:
    timeout: "30s"
    receipt_template: "default"
  inventory:
    low_stock_threshold: 10
    auto_reorder: false
  pricing:
    markup_percentage: 30
    discount_limit: 20

# Configurações de Integração
integrations:
  payment_gateways:
    - name: "stripe"
      enabled: false
      api_key: "sua_stripe_api_key"
    - name: "paypal"
      enabled: false
      client_id: "seu_paypal_client_id"
      secret: "seu_paypal_secret"
  
  shipping:
    - name: "correios"
      enabled: false
      username: "seu_usuario_correios"
      password: "sua_senha_correios"
    - name: "fedex"
      enabled: false
      api_key: "sua_fedex_api_key"
      account_number: "seu_numero_conta"

# Configurações de Relatórios
reports:
  default_format: "pdf"
  storage_path: "reports/"
  retention: 90 # dias
  scheduling:
    enabled: true
    timezone: "America/Sao_Paulo" 